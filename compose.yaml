services:
  tubeshade:
    image: ${TUBESHADE_IMAGE:-ghcr.io/tubeshade/tubeshade:0.1.8}
    ports:
      - "80:8080"
    networks:
      - internal
    depends_on:
      database:
        condition: service_healthy
        restart: true
      pot_provider:
        condition: service_healthy
        restart: true
    environment:
      ENVIRONMENT: Production
      Database__ConnectionString: "Host=database; Port=5432; Username=${POSTGRES_USER:-postgres}; Password=${POSTGRES_PASSWORD:?error}; Database=${POSTGRES_DB:-tubeshade}"
      Ytdlp__PotBaseUrl: "http://pot_provider:4416"
    volumes:
      - app_data:/home/app
      - libraries:/var/opt/tubeshade

  database:
    image: postgres:18.1-trixie
    networks:
      - internal
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tubeshade}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      retries: 3
      start_period: 10s
      start_interval: 1s
      timeout: 3s
    volumes:
      - database:/var/lib/postgresql

  pot_provider:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1-deno
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "deno", "eval", "try { const r = await fetch('http://localhost:4416/ping'); if (!r.ok) Deno.exit(1); } catch { Deno.exit(1); }" ]
      interval: 10s
      retries: 3
      start_period: 10s
      start_interval: 1s
      timeout: 3s

networks:
  internal: { }

volumes:
  database:
  app_data:
  libraries:
